<svg viewBox="0 0 552 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Icon: Photo/Image Editor -->
  <g>
    <rect x="60" y="40" width="130" height="130" rx="12" fill="url(#grad1)" opacity="0.9"/>
    <rect x="70" y="50" width="110" height="110" rx="8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Circle for aperture -->
    <circle cx="125" cy="105" r="30" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="125" cy="105" r="20" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="125" cy="105" r="12" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- Aperture blades -->
    <line x1="125" y1="75" x2="125" y2="55" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="155" y1="105" x2="175" y2="105" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="125" y1="135" x2="125" y2="155" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="95" y1="105" x2="75" y2="105" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Center Icon: Design/Shapes -->
  <g>
    <rect x="211" y="40" width="130" height="130" rx="12" fill="url(#grad2)" opacity="0.95"/>
    
    <!-- Design elements - geometric shapes -->
    <path d="M 245 100 L 285 60 L 305 80 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
    <rect x="250" y="95" width="45" height="45" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2" transform="rotate(-15 272.5 117.5)"/>
    <circle cx="290" cy="130" r="18" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Design accent lines -->
    <line x1="245" y1="140" x2="310" y2="140" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="255" y1="155" x2="295" y2="155" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Right Icon: PDF Document -->
  <g>
    <rect x="362" y="40" width="130" height="130" rx="12" fill="url(#grad1)" opacity="0.85"/>
    <rect x="377" y="55" width="100" height="130" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Document fold corner -->
    <path d="M 477 55 L 477 75 L 457 75 Z" fill="#FFFFFF" opacity="0.3"/>
    
    <!-- PDF text representation -->
    <text x="427" y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PDF</text>
    
    <!-- Document lines -->
    <line x1="387" y1="125" x2="467" y2="125" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="387" y1="135" x2="467" y2="135" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <line x1="387" y1="145" x2="450" y2="145" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Connection Lines - X Pattern -->
  <g opacity="0.6">
    <line x1="190" y1="105" x2="211" y2="105" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="341" y1="105" x2="362" y2="105" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Diagonal connectors for X effect -->
    <line x1="195" y1="75" x2="220" y2="60" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="332" y1="135" x2="360" y2="155" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Bottom Section: ToolsForge Text -->
  <g>
    <!-- Text Background -->
    <rect x="60" y="195" width="432" height="100" rx="12" fill="rgba(15, 23, 42, 0.4)" stroke="url(#grad1)" stroke-width="1"/>
    
    <!-- Logo Text -->
    <text x="276" y="240" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ToolsForge</text>
    
    <!-- Tagline -->
    <text x="276" y="270" font-family="Arial, sans-serif" font-size="14" fill="#06B6D4" text-anchor="middle" opacity="0.9">Free Tools for Creators &amp; Professionals</text>
  </g>

  <!-- Subtle glow effects -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>